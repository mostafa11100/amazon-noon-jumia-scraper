name: Jumia CF Categories - Self-Hosted Runner

on:
  schedule:
    - cron: '20 3 * * *'   # 5:20 AM Egypt time (after other scrapers start)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max products per category'
        required: false
        default: '5000'

defaults:
  run:
    shell: bash

jobs:
  scrape:
    name: "Scrape: ${{ matrix.name }}"
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Grocery"
            url: "https://www.jumia.com.eg/grocery/"
            idx: 11
          - name: "Luggage & Bags"
            url: "https://www.jumia.com.eg/bags-luggage/"
            idx: 16
          - name: "Office Supplies"
            url: "https://www.jumia.com.eg/office-supplies/"
            idx: 19

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install curl-cffi beautifulsoup4 lxml tenacity tqdm playwright playwright-stealth

      - name: Install Playwright browser
        run: playwright install chromium

      - name: "Scrape ${{ matrix.name }}"
        run: |
          python jumia_spider.py \
            --mode scrape \
            --category-name "${{ matrix.name }}" \
            --category-url  "${{ matrix.url }}" \
            --group-index   ${{ matrix.idx }} \
            --limit ${{ github.event.inputs.limit || '5000' }} \
            --deep
        timeout-minutes: 120

      - name: Upload products artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "jumia-cf-${{ matrix.idx }}"
          path: "products_${{ matrix.idx }}.json"

  export:
    name: Export & Push to Master
    needs: scrape
    if: always()
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install curl-cffi beautifulsoup4 lxml tenacity tqdm

      - name: Download all product artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jumia-cf-*
          merge-multiple: true

      - name: Merge JSON -> CSV
        run: python jumia_spider.py --mode export

      - name: Rename output CSV
        run: |
          find output/ -name "jumia_products_*.csv" | head -1 | xargs -I{} cp {} jumia_cf_products.csv || true

      - name: Push to master repo
        env:
          MASTER_TOKEN: ${{ secrets.MASTER_REPO_TOKEN }}
        run: |
          git clone https://${MASTER_TOKEN}@github.com/mostafa11100/scraped-products-master.git master_repo
          mkdir -p master_repo/data/account_local
          cp jumia_cf_products.csv master_repo/data/account_local/jumia_products.csv 2>/dev/null || true
          cd master_repo
          git config user.email "scraper-bot@github.com"
          git config user.name "Scraper Bot"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "Update jumia CF categories (local runner) - $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break || sleep $((RANDOM % 20 + 10))
            done
          fi
