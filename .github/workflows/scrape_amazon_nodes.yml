name: Amazon Node Scraper - Account 4 (24 nodes)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Max products per node
        required: false
        default: '99999'

jobs:
  scrape:
    name: "Node ${{ matrix.node_id }} (${{ matrix.node_name }})"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { node_id: "21832886031", node_name: "node_21832886031" }
          - { node_id: "18017874031", node_name: "Agricultural Vehicle Parts & Equipment" }
          - { node_id: "21805227031", node_name: "node_21805227031" }
          - { node_id: "21845181031", node_name: "node_21845181031" }
          - { node_id: "21826029031", node_name: "node_21826029031" }
          - { node_id: "18020637031", node_name: "node_18020637031" }
          - { node_id: "21832878031", node_name: "node_21832878031" }
          - { node_id: "21826026031", node_name: "Perfumes" }
          - { node_id: "21845419031", node_name: "node_21845419031" }
          - { node_id: "21868934031", node_name: "node_21868934031" }
          - { node_id: "96581804031", node_name: "node_96581804031" }
          - { node_id: "21833200031", node_name: "node_21833200031" }
          - { node_id: "212401097031", node_name: "node_212401097031" }
          - { node_id: "26082316031", node_name: "node_26082316031" }
          - { node_id: "21857904031", node_name: "node_21857904031" }
          - { node_id: "21857914031", node_name: "node_21857914031" }
          - { node_id: "21857944031", node_name: "node_21857944031" }
          - { node_id: "21832907031", node_name: "node_21832907031" }
          - { node_id: "21857878031", node_name: "node_21857878031" }
          - { node_id: "21857974031", node_name: "node_21857974031" }
          - { node_id: "21832982031", node_name: "node_21832982031" }
          - { node_id: "21833220031", node_name: "node_21833220031" }
          - { node_id: "21833429031", node_name: "node_21833429031" }
          - { node_id: "86421114031", node_name: "Sell" }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: pip install curl-cffi scrapy
      - name: Stagger start
        run: sleep $((RANDOM % 20 + 5))
      - name: Scrape node ${{ matrix.node_id }}
        run: python amazon_node_spider.py --node_id ${{ matrix.node_id }} --node_name "${{ matrix.node_name }}" --limit ${{ github.event.inputs.limit || '99999' }}
        timeout-minutes: 90
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.node_id }}
          path: node_*.json
          if-no-files-found: warn

  export:
    name: Merge and Export CSV
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          merge-multiple: true
      - name: Merge JSON to CSV
        run: python merge_nodes.py
      - name: Upload merged CSV
        uses: actions/upload-artifact@v4
        with:
          name: amazon-products-nodes
          path: amazon_products_nodes.csv
      - name: Push to master repo
        if: always()
        env:
          MASTER_TOKEN: ${{ secrets.MASTER_REPO_TOKEN }}
          MASTER_OWNER: ${{ secrets.MASTER_REPO_OWNER }}
        run: |
          if [ -z "$MASTER_TOKEN" ]; then echo "No MASTER_REPO_TOKEN"; exit 0; fi
          git clone https://${{MASTER_TOKEN}}@github.com/${{MASTER_OWNER}}/scraped-products-master.git master_repo
          mkdir -p master_repo/data/account4/
          cp amazon_products_nodes.csv master_repo/data/account4/amazon_products_nodes.csv
          cd master_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update amazon nodes from account4 - $(date +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && echo "Pushed OK" && break || sleep $((RANDOM % 10 + 5))
          done
