name: Amazon Node Scraper - Account 4 (22 nodes)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max products per node'
        required: false
        default: '99999'

jobs:
  scrape:
    name: "Node ${{ matrix.node_id }} (${{ matrix.node_name }})"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { node_id: "21857922031",   node_name: "Cat7922031" }
          - { node_id: "21845403031",   node_name: "Cat5403031" }
          - { node_id: "18018045031",   node_name: "Cat8045031" }
          - { node_id: "18022446031",   node_name: "Cat2446031" }
          - { node_id: "21775780031",   node_name: "Cat5780031" }
          - { node_id: "21857878031",   node_name: "Cat7878031" }
          - { node_id: "21857904031",   node_name: "Cat7904031" }
          - { node_id: "21845414031",   node_name: "Cat5414031" }
          - { node_id: "21868933031",   node_name: "Cat8933031" }
          - { node_id: "21832982031",   node_name: "Cat2982031" }
          - { node_id: "26082322031",   node_name: "Cat2322031" }
          - { node_id: "27972173031",   node_name: "Cat2173031" }
          - { node_id: "18022560031",   node_name: "Video Games" }
          - { node_id: "21833429031",   node_name: "Cat3429031" }
          - { node_id: "49987991031",   node_name: "Cat7991031" }
          - { node_id: "21832870031",   node_name: "Cat2870031" }
          - { node_id: "21845202031",   node_name: "Cat5202031" }
          - { node_id: "21845418031",   node_name: "Cat5418031" }
          - { node_id: "21868934031",   node_name: "Cat8934031" }
          - { node_id: "21832886031",   node_name: "Cat2886031" }
          - { node_id: "21832883031",   node_name: "Mobile Phones" }
          - { node_id: "21857955031",   node_name: "Cat7955031" }
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install curl-cffi scrapy

      - name: Stagger start
        run: sleep $((RANDOM % 20 + 5))

      - name: Scrape node ${{ matrix.node_id }}
        run: |
          python amazon_node_spider.py \
            --node_id   ${{ matrix.node_id }} \
            --node_name "${{ matrix.node_name }}" \
            --limit     ${{ github.event.inputs.limit || '99999' }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: "node-${{ matrix.node_id }}"
          path: "node_${{ matrix.node_id }}.json"

  export:
    name: Merge & Export CSV
    runs-on: ubuntu-latest
    needs: scrape
    if: always()
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all node artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          merge-multiple: true

      - name: Merge JSON → CSV + summary
        run: |
          python - <<'EOF'
          import json, glob, csv, sys
          sys.stdout.reconfigure(encoding="utf-8", errors="replace")

          merged = []
          for fname in sorted(glob.glob("node_*.json")):
              try:
                  data = json.load(open(fname, encoding="utf-8"))
                  merged.extend(data)
                  print(f"{fname}: {len(data)} products")
              except Exception as e:
                  print(f"{fname}: ERROR - {e}")

          # Deduplicate by ASIN globally
          seen = set()
          unique = []
          for p in merged:
              if p["asin"] not in seen:
                  seen.add(p["asin"])
                  unique.append(p)

          print(f"\nTotal raw : {len(merged)}")
          print(f"Unique    : {len(unique)}  (after global ASIN dedup)")

          columns = [
              "platform", "asin", "title", "brand", "category",
              "current_price", "original_price", "discount",
              "rating", "reviews_count",
              "prime_eligible", "amazon_choice", "sponsored",
              "main_image", "product_url", "scraped_at",
          ]
          with open("amazon_products.csv", "w", encoding="utf-8-sig", newline="") as f:
              writer = csv.DictWriter(f, fieldnames=columns, extrasaction="ignore")
              writer.writeheader()
              writer.writerows(unique)
          print("Saved: amazon_products.csv")
          EOF

      - name: Upload final CSV
        uses: actions/upload-artifact@v4
        with:
          name: amazon-products-nodes
          path: amazon_products.csv

      - name: Push to master repo
        env:
          MASTER_TOKEN: ${{ secrets.MASTER_REPO_TOKEN }}
        run: |
          git clone https://${MASTER_TOKEN}@github.com/khaledali45947-dev/scraped-products-master.git master_repo
          mkdir -p master_repo/data/account4
          cp amazon_products.csv master_repo/data/account4/amazon_products_nodes.csv 2>/dev/null || true
          cd master_repo
          git config user.email "scraper-bot@github.com"
          git config user.name "Scraper Bot"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "Node scraper test from account4 - $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break || sleep $((RANDOM % 20 + 10))
            done
          fi
